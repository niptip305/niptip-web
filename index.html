<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NipTip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1a0d18 0%, #0A0A0F 60%);
    color: #F5F5FA;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    min-height: 100vh;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 36px 26px;
    text-align: center;
    backdrop-filter: blur(20px);
  }
  .avatar-wrap {
    width: 104px;
    height: 104px;
    margin: 0 auto;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #FF1493, #0FF0DC);
  }
  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    background: #15151D;
  }
  .username {
    font-family: 'Montserrat', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin: 16px 0 4px;
    letter-spacing: -0.3px;
  }
  .bio { font-size: 14px; color: #9A9AAE; margin: 0 0 24px; }
  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: #9A9AAE;
    text-align: left;
    margin: 24px 0 10px;
  }
  .link-item {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 13px 16px;
    margin-bottom: 8px;
    text-align: left;
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .link-item:active { transform: scale(0.98); }
  a.link-item:hover { border-color: rgba(255,20,147,0.4); }
  .link-item .label { font-size: 11px; color: #9A9AAE; display: block; margin-bottom: 2px; }
  .link-item .value { font-size: 15px; font-weight: 600; word-break: break-word; }
  .link-item .arrow { margin-left: auto; opacity: 0.4; font-size: 14px; }
  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .badge-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    background: linear-gradient(135deg, #FF1493, #0FF0DC);
    color: #0A0A0F;
    box-shadow: 0 2px 12px rgba(255,20,147,0.25);
  }
  .badge-chip .emoji { font-size: 14px; }
  .referral-card {
    margin-top: 24px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(255,20,147,0.08);
    border: 1px solid rgba(255,20,147,0.15);
  }
  .referral-count {
    font-family: 'Montserrat', sans-serif;
    font-size: 30px;
    font-weight: 900;
    background: linear-gradient(135deg, #FF1493, #0FF0DC);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .referral-label { font-size: 11px; color: #9A9AAE; letter-spacing: 1px; font-weight: 600; }
  .state-message { color: #9A9AAE; font-size: 14px; padding: 40px 0; }
  .post-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }
  .grid-item {
    aspect-ratio: 1;
    overflow: hidden;
    background: #1D1D27;
  }
  .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #after-hours-gate {
    background: #14090A;
    border: 1px solid #C41E3A;
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
  }
  .gate-badge { font-size: 26px; font-weight: 800; color: #C41E3A; margin-bottom: 6px; }
  .gate-text { font-size: 13px; color: #9A9AAE; margin-bottom: 14px; }
  .gate-btn {
    background: #C41E3A;
    color: #fff;
    border: none;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
  }

  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: #444;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <p class="state-message">Loading...</p>
  </div>

<script>
  const SUPABASE_URL = 'https://jtqlkpiggmzvpcyjjhwd.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_klTPF2ZiLYzHqOsehCIQlA__wMG_176';
  const cardEl = document.getElementById('card');

  const TIP_MILESTONES = [
    { threshold: 10, emoji: '🙂', label: 'Rising Star' },
    { threshold: 25, emoji: '💫', label: 'Fan Favorite' },
    { threshold: 50, emoji: '🎉', label: 'Crowd Pleaser' },
    { threshold: 100, emoji: '🔥', label: 'Century Tipper' },
    { threshold: 250, emoji: '🌟', label: 'Superstar' },
    { threshold: 500, emoji: '✨', label: 'Tip Legend' },
  ];

  const REFERRAL_TIERS = [
    { threshold: 5, emoji: '🥇', label: 'Badge One' },
    { threshold: 15, emoji: '🥈', label: 'Badge Two' },
    { threshold: 30, emoji: '🥉', label: 'Badge Three' },
    { threshold: 50, emoji: '👑', label: 'Ambassador' },
  ];

  // Only earned badges — filtered before rendering, never shows locked ones.
  function earnedBadgesHtml(tiers, count) {
    const earned = tiers.filter(t => count >= t.threshold);
    if (earned.length === 0) return '';
    return earned.map(t =>
      `<div class="badge-chip"><span class="emoji">${t.emoji}</span>${t.label}</div>`
    ).join('');
  }

  function linkTypeLabel(type) {
    const map = { cashApp: 'Cash App', venmo: 'Venmo', paypal: 'PayPal', wise: 'Wise' };
    return map[type] || type || 'Link';
  }

  // Prefers the stored full 'url' (new entries); falls back to
  // constructing one from type + value for older entries.
  function linkHref(link) {
    if (link.url) return link.url;

    const value = (link.value || '').trim();
    if (!value) return null;
    if (/^https?:\/\//i.test(value)) return value;

    switch (link.type) {
      case 'cashApp':
        return `https://cash.app/${value.replace(/^\$/, '')}`;
      case 'venmo':
        return `https://venmo.com/${value.replace(/^@/, '')}`;
      case 'paypal':
        return `https://paypal.me/${value.replace(/^@/, '')}`;
      case 'wise':
        return `https://wise.com/pay/me/${value.replace(/^@/, '')}`;
      default:
        // Custom links (e.g. "niptip.store") — treat as a bare domain.
        return `https://${value}`;
    }
  }

  // Strips known domain prefixes so the display always shows just the
  // handle, even for older rows where 'value' was saved as a full URL.
  function displayValue(link) {
    const raw = (link.value || '').trim();
    const patterns = {
      cashApp: /^https?:\/\/(www\.)?cash\.app\//i,
      venmo: /^https?:\/\/(www\.)?venmo\.com\//i,
      paypal: /^https?:\/\/(www\.)?paypal\.me\//i,
      wise: /^https?:\/\/(www\.)?wise\.com\/pay\/me\//i,
    };
    const pattern = patterns[link.type];
    if (pattern && pattern.test(raw)) {
      return raw.replace(pattern, '').replace(/\/$/, '');
    }
    return raw;
  }

  function linksHtml(links) {
    if (!Array.isArray(links) || links.length === 0) {
      return '<p class="state-message">No payment links yet.</p>';
    }
    return links.map(l => {
      const href = linkHref(l);
      const tag = href ? 'a' : 'div';
      const hrefAttr = href ? `href="${href}" target="_blank" rel="noopener"` : '';
      return `
        <${tag} class="link-item" ${hrefAttr}>
          <div>
            <span class="label">${l.label || linkTypeLabel(l.type)}</span>
            <span class="value">${displayValue(l)}</span>
          </div>
          ${href ? '<span class="arrow">↗</span>' : ''}
        </${tag}>
      `;
    }).join('');
  }

  function postGridHtml(posts) {
    if (posts.length === 0) return '';
    return posts.map(p => {
      const thumb = (p.image_urls && p.image_urls[0]) || '';
      return `<div class="grid-item"><img src="${thumb}" loading="lazy" /></div>`;
    }).join('');
  }

  function renderProfile(profile, stats, posts) {
    const tipCount = stats?.tip_count || 0;
    const referralCount = stats?.referral_count || 0;

    const tipBadges = earnedBadgesHtml(TIP_MILESTONES, tipCount);
    const referralBadges = earnedBadgesHtml(REFERRAL_TIERS, referralCount);

    const publicPosts = posts.filter(p => p.feed_type === 'public');
    const afterHoursPosts = posts.filter(p => p.feed_type === 'after_hours');

    cardEl.innerHTML = `
      <div class="avatar-wrap">
        ${profile.photo_url
          ? `<img class="avatar" src="${profile.photo_url}" alt="${profile.username}" />`
          : `<div class="avatar"></div>`}
      </div>
      <h1 class="username">@${profile.username}</h1>
      <p class="bio">${profile.display_name || ''}</p>

      <div class="section-label">PAYMENT LINKS</div>
      ${linksHtml(profile.payment_links)}

      ${tipBadges ? `
        <div class="section-label">TIP MILESTONES</div>
        <div class="badge-row">${tipBadges}</div>
      ` : ''}

      ${referralBadges ? `
        <div class="section-label">REFERRAL TIERS</div>
        <div class="badge-row">${referralBadges}</div>
      ` : ''}

      <div class="referral-card">
        <div class="referral-count">${referralCount}</div>
        <div class="referral-label">REFERRALS</div>
      </div>

      ${publicPosts.length > 0 ? `
        <div class="section-label">PUBLIC</div>
        <div class="post-grid">${postGridHtml(publicPosts)}</div>
      ` : ''}

      ${afterHoursPosts.length > 0 ? `
        <div class="section-label">AFTER HOURS</div>
        <div id="after-hours-wrap">
          <div id="after-hours-gate">
            <div class="gate-badge">18+</div>
            <p class="gate-text">This creator has adult content. Confirm your age to view.</p>
            <button class="gate-btn" onclick="document.getElementById('after-hours-gate').remove(); document.getElementById('after-hours-grid').style.display='grid';">I'm 18 or older</button>
          </div>
          <div id="after-hours-grid" class="post-grid" style="display:none;">${postGridHtml(afterHoursPosts)}</div>
        </div>
      ` : ''}

      <div class="footer">POWERED BY NIPTIP</div>
    `;
  }

  function renderNotFound() {
    cardEl.innerHTML = '<p class="state-message">Profile not found.</p>';
  }

  function renderNoUsername() {
    cardEl.innerHTML = '<p class="state-message">No username provided.</p>';
  }

  async function main() {
    if (typeof supabase === 'undefined') {
      cardEl.innerHTML = '<p class="state-message">Could not load. Please refresh.</p>';
      return;
    }

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const params = new URLSearchParams(window.location.search);
    const username = params.get('u')?.trim();

    if (!username) {
      renderNoUsername();
      return;
    }

    try {
      const { data: profile, error } = await supabaseClient
        .from('profiles')
        .select('id, username, display_name, photo_url, payment_links')
        .ilike('username', username)
        .maybeSingle();

      if (error || !profile) {
        renderNotFound();
        return;
      }

      const { data: stats } = await supabaseClient
        .from('leaderboard_totals')
        .select('tip_count, referral_count')
        .ilike('username', username)
        .maybeSingle();

      const { data: posts } = await supabaseClient
        .from('center_stage_posts')
        .select('image_urls, feed_type, created_at')
        .eq('user_id', profile.id)
        .order('created_at', { ascending: false });

      renderProfile(profile, stats, posts || []);

      try {
        await supabaseClient.rpc('increment_profile_taps', { profile_username: profile.username });
      } catch (tapError) {
        console.warn('Tap counter failed (non-critical):', tapError);
      }
    } catch (e) {
      console.error('NipTip profile error:', e);
      cardEl.innerHTML = '<p class="state-message">Something went wrong. Please refresh.</p>';
    }
  }

  main();
</script>
</body>
</html>
