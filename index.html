<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NipTip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1a0d18 0%, #0A0A0F 60%);
    color: #F5F5FA;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
    min-height: 100vh;
  }

  /* ── Pull-to-refresh indicator ── */
  #ptr-indicator {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: linear-gradient(135deg, #FF1493, #0FF0DC);
    color: #0A0A0F;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 8px 20px;
    border-radius: 0 0 16px 16px;
    transition: transform 0.25s ease;
    z-index: 999;
    pointer-events: none;
  }
  #ptr-indicator.visible { transform: translateX(-50%) translateY(0); }

  .card {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 36px 26px;
    text-align: center;
    backdrop-filter: blur(20px);
  }

  .avatar-wrap {
    width: 104px;
    height: 104px;
    margin: 0 auto;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #FF1493, #0FF0DC);
  }
  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    background: #15151D;
  }

  .username {
    font-family: 'Montserrat', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin: 16px 0 4px;
    letter-spacing: -0.3px;
  }
  .bio { font-size: 14px; color: #9A9AAE; margin: 0 0 24px; }

  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: #9A9AAE;
    text-align: left;
    margin: 24px 0 10px;
  }

  .link-item {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 13px 16px;
    margin-bottom: 8px;
    text-align: left;
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .link-item:active { transform: scale(0.98); }
  a.link-item:hover { border-color: rgba(255,20,147,0.4); }
  .link-item .label { font-size: 11px; color: #9A9AAE; display: block; margin-bottom: 2px; }
  .link-item .value { font-size: 15px; font-weight: 600; word-break: break-word; }
  .link-item .arrow { margin-left: auto; opacity: 0.4; font-size: 14px; }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .badge-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    background: linear-gradient(135deg, #FF1493, #0FF0DC);
    color: #0A0A0F;
    box-shadow: 0 2px 12px rgba(255,20,147,0.25);
  }
  .badge-chip .emoji { font-size: 14px; }

  .referral-card {
    margin-top: 24px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(255,20,147,0.08);
    border: 1px solid rgba(255,20,147,0.15);
  }
  .referral-count {
    font-family: 'Montserrat', sans-serif;
    font-size: 30px;
    font-weight: 900;
    background: linear-gradient(135deg, #FF1493, #0FF0DC);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .referral-label { font-size: 11px; color: #9A9AAE; letter-spacing: 1px; font-weight: 600; }

  .state-message { color: #9A9AAE; font-size: 14px; padding: 40px 0; }

  /* ── Post Feed ── */
  #feed-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 2px;
  }

  .post-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px;
    overflow: hidden;
    text-align: left;
  }

  /* Pinch-to-zoom image container */
  .post-img-wrap {
    width: 100%;
    overflow: hidden;
    position: relative;
    touch-action: none; /* we handle gestures manually */
    cursor: grab;
    background: #0e0e14;
  }
  .post-img-wrap:active { cursor: grabbing; }

  .post-img {
    width: 100%;
    display: block;
    object-fit: cover;
    transform-origin: center center;
    transform: scale(1) translate(0px, 0px);
    transition: transform 0.05s linear;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none; /* gestures handled by wrapper */
  }

  .post-meta {
    padding: 12px 14px;
  }
  .post-caption {
    font-size: 14px;
    line-height: 1.5;
    color: #E0E0EA;
    margin: 0 0 8px;
    word-break: break-word;
  }
  .post-stats {
    display: flex;
    gap: 14px;
    font-size: 12px;
    color: #9A9AAE;
    font-weight: 500;
  }
  .post-stat { display: flex; align-items: center; gap: 4px; }

  .post-time {
    font-size: 11px;
    color: #555566;
    margin-top: 6px;
  }

  .feed-empty {
    color: #9A9AAE;
    font-size: 13px;
    text-align: center;
    padding: 24px 0 8px;
  }

  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: #444;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div id="ptr-indicator">REFRESHING…</div>

<div class="card" id="card">
  <p class="state-message">Loading…</p>
</div>

<script>
(function () {
  'use strict';

  const SUPABASE_URL     = 'https://jtqlkpiggmzvpcyjjhwd.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_klTPF2ZiLYzHqOsehCIQlA__wMG_176';

  // ── State ──────────────────────────────────────────────────────────────────
  let sbClient      = null;
  let currentUser   = null;  // { username }
  let realtimeSub   = null;
  let posts         = [];    // sorted newest-first

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const cardEl = document.getElementById('card');
  const ptrEl  = document.getElementById('ptr-indicator');

  // ── Badge data ─────────────────────────────────────────────────────────────
  const TIP_MILESTONES = [
    { threshold: 10,  emoji: '🙂', label: 'Rising Star'    },
    { threshold: 25,  emoji: '💫', label: 'Fan Favorite'   },
    { threshold: 50,  emoji: '🎉', label: 'Crowd Pleaser'  },
    { threshold: 100, emoji: '🔥', label: 'Century Tipper' },
    { threshold: 250, emoji: '🌟', label: 'Superstar'      },
    { threshold: 500, emoji: '✨', label: 'Tip Legend'     },
  ];

  const REFERRAL_TIERS = [
    { threshold: 5,  emoji: '🥇', label: 'Badge One'   },
    { threshold: 15, emoji: '🥈', label: 'Badge Two'   },
    { threshold: 30, emoji: '🥉', label: 'Badge Three' },
    { threshold: 50, emoji: '👑', label: 'Ambassador'  },
  ];

  // ── Helpers ────────────────────────────────────────────────────────────────
  function earnedBadgesHtml(tiers, count) {
    const earned = tiers.filter(t => count >= t.threshold);
    if (!earned.length) return '';
    return earned.map(t =>
      `<div class="badge-chip"><span class="emoji">${t.emoji}</span>${t.label}</div>`
    ).join('');
  }

  function linkTypeLabel(type) {
    const map = { cashApp: 'Cash App', venmo: 'Venmo', paypal: 'PayPal', wise: 'Wise' };
    return map[type] || type || 'Link';
  }

  function linkHref(link) {
    if (link.url) return link.url;
    const value = (link.value || '').trim();
    if (!value) return null;
    if (/^https?:\/\//i.test(value)) return value;
    switch (link.type) {
      case 'cashApp': return `https://cash.app/${value.replace(/^\$/, '')}`;
      case 'venmo':   return `https://venmo.com/${value.replace(/^@/, '')}`;
      case 'paypal':  return `https://paypal.me/${value.replace(/^@/, '')}`;
      case 'wise':    return `https://wise.com/pay/me/${value.replace(/^@/, '')}`;
      default:        return `https://${value}`;
    }
  }

  function displayValue(link) {
    const raw = (link.value || '').trim();
    const patterns = {
      cashApp: /^https?:\/\/(www\.)?cash\.app\//i,
      venmo:   /^https?:\/\/(www\.)?venmo\.com\//i,
      paypal:  /^https?:\/\/(www\.)?paypal\.me\//i,
      wise:    /^https?:\/\/(www\.)?wise\.com\/pay\/me\//i,
    };
    const pat = patterns[link.type];
    if (pat && pat.test(raw)) return raw.replace(pat, '').replace(/\/$/, '');
    return raw;
  }

  function linksHtml(links) {
    if (!Array.isArray(links) || !links.length)
      return '<p class="state-message">No payment links yet.</p>';
    return links.map(l => {
      const href = linkHref(l);
      const tag  = href ? 'a' : 'div';
      const attr = href ? `href="${href}" target="_blank" rel="noopener"` : '';
      return `
        <${tag} class="link-item" ${attr}>
          <div>
            <span class="label">${l.label || linkTypeLabel(l.type)}</span>
            <span class="value">${displayValue(l)}</span>
          </div>
          ${href ? '<span class="arrow">↗</span>' : ''}
        </${tag}>`;
    }).join('');
  }

  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  }

  // ── Post rendering ─────────────────────────────────────────────────────────
  function postHtml(post) {
    const imgs = Array.isArray(post.image_urls) ? post.image_urls : [];
    const imgBlock = imgs.length
      ? `<div class="post-img-wrap" data-post-id="${post.id}">
           <img class="post-img" src="${imgs[0]}" alt="post" loading="lazy" />
         </div>`
      : '';

    return `
      <div class="post-card" data-post-id="${post.id}">
        ${imgBlock}
        <div class="post-meta">
          ${post.caption ? `<p class="post-caption">${escHtml(post.caption)}</p>` : ''}
          <div class="post-stats">
            <span class="post-stat">❤️ ${post.like_count || 0}</span>
            <span class="post-stat">💬 ${post.comment_count || 0}</span>
          </div>
          <div class="post-time">${timeAgo(post.created_at)}</div>
        </div>
      </div>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderFeedList() {
    const feedEl = document.getElementById('feed-list');
    if (!feedEl) return;
    if (!posts.length) {
      feedEl.innerHTML = '<p class="feed-empty">No posts yet.</p>';
      return;
    }
    feedEl.innerHTML = posts.map(postHtml).join('');
    attachZoomListeners();
  }

  // ── Pinch-to-zoom ──────────────────────────────────────────────────────────
  function attachZoomListeners() {
    document.querySelectorAll('.post-img-wrap').forEach(wrap => {
      // remove stale listeners by cloning
      const fresh = wrap.cloneNode(true);
      wrap.parentNode.replaceChild(fresh, wrap);
      setupZoom(fresh);
    });
  }

  function setupZoom(wrap) {
    const img = wrap.querySelector('.post-img');
    if (!img) return;

    let scale      = 1;
    let tx         = 0;
    let ty         = 0;
    let lastDist   = null;
    let lastMidX   = 0;
    let lastMidY   = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let baseTx     = 0;
    let baseTy     = 0;

    const MIN_SCALE = 1;
    const MAX_SCALE = 5;

    function applyTransform(animate) {
      img.style.transition = animate ? 'transform 0.25s ease' : 'none';
      img.style.transform  = `scale(${scale}) translate(${tx}px, ${ty}px)`;
    }

    function clampTranslation() {
      if (scale <= 1) { tx = 0; ty = 0; return; }
      const rect   = wrap.getBoundingClientRect();
      const maxTx  = (rect.width  * (scale - 1)) / (2 * scale);
      const maxTy  = (rect.height * (scale - 1)) / (2 * scale);
      tx = Math.max(-maxTx, Math.min(maxTx, tx));
      ty = Math.max(-maxTy, Math.min(maxTy, ty));
    }

    function dist(t) {
      const dx = t[0].clientX - t[1].clientX;
      const dy = t[0].clientY - t[1].clientY;
      return Math.hypot(dx, dy);
    }

    function midpoint(t) {
      return {
        x: (t[0].clientX + t[1].clientX) / 2,
        y: (t[0].clientY + t[1].clientY) / 2,
      };
    }

    // Touch events
    wrap.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        lastDist = dist(e.touches);
        const mid = midpoint(e.touches);
        lastMidX = mid.x;
        lastMidY = mid.y;
      } else if (e.touches.length === 1 && scale > 1) {
        isDragging = true;
        dragStartX = e.touches[0].clientX;
        dragStartY = e.touches[0].clientY;
        baseTx = tx;
        baseTy = ty;
      }
    }, { passive: true });

    wrap.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && lastDist !== null) {
        e.preventDefault();
        const newDist = dist(e.touches);
        const ratio   = newDist / lastDist;
        const mid     = midpoint(e.touches);

        scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * ratio));
        tx   += (mid.x - lastMidX) / scale;
        ty   += (mid.y - lastMidY) / scale;

        lastDist = newDist;
        lastMidX = mid.x;
        lastMidY = mid.y;

        clampTranslation();
        applyTransform(false);
      } else if (e.touches.length === 1 && isDragging) {
        if (scale > 1) e.preventDefault();
        tx = baseTx + (e.touches[0].clientX - dragStartX) / scale;
        ty = baseTy + (e.touches[0].clientY - dragStartY) / scale;
        clampTranslation();
        applyTransform(false);
      }
    }, { passive: false });

    wrap.addEventListener('touchend', e => {
      if (e.touches.length < 2) lastDist = null;
      if (e.touches.length === 0) isDragging = false;
      if (scale < 1.05) {
        scale = 1; tx = 0; ty = 0;
        applyTransform(true);
      }
    }, { passive: true });

    // Double-tap to reset
    let lastTap = 0;
    wrap.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 300) {
        scale = 1; tx = 0; ty = 0;
        applyTransform(true);
      }
      lastTap = now;
    }, { passive: true });
  }

  // ── Profile rendering ──────────────────────────────────────────────────────
  function renderProfile(profile, stats) {
    const tipCount      = stats?.tip_count      || 0;
    const referralCount = stats?.referral_count || 0;
    const tipBadges     = earnedBadgesHtml(TIP_MILESTONES, tipCount);
    const referralBadges = earnedBadgesHtml(REFERRAL_TIERS, referralCount);

    cardEl.innerHTML = `
      <div class="avatar-wrap">
        ${profile.photo_url
          ? `<img class="avatar" src="${profile.photo_url}" alt="${profile.username}" />`
          : `<div class="avatar"></div>`}
      </div>
      <h1 class="username">@${profile.username}</h1>
      <p class="bio">${profile.display_name || ''}</p>

      <div class="section-label">PAYMENT LINKS</div>
      ${linksHtml(profile.payment_links)}

      ${tipBadges ? `
        <div class="section-label">TIP MILESTONES</div>
        <div class="badge-row">${tipBadges}</div>` : ''}

      ${referralBadges ? `
        <div class="section-label">REFERRAL TIERS</div>
        <div class="badge-row">${referralBadges}</div>` : ''}

      <div class="referral-card">
        <div class="referral-count">${referralCount}</div>
        <div class="referral-label">REFERRALS</div>
      </div>

      <div class="section-label">POSTS</div>
      <div id="feed-list"><p class="feed-empty">Loading posts…</p></div>

      <div class="footer">POWERED BY NIPTIP</div>
    `;
  }

  function renderNotFound()  { cardEl.innerHTML = '<p class="state-message">Profile not found.</p>'; }
  function renderNoUsername(){ cardEl.innerHTML = '<p class="state-message">No username provided.</p>'; }
  function renderError()     { cardEl.innerHTML = '<p class="state-message">Something went wrong. Please refresh.</p>'; }

  // ── Supabase real-time feed ────────────────────────────────────────────────
  async function loadPosts(username) {
    try {
      const { data, error } = await sbClient
        .from('center_stage_posts')
        .select('id, caption, image_urls, like_count, comment_count, created_at')
        .ilike('username', username)
        .eq('feed_type', 'public')
        .order('created_at', { ascending: false })
        .limit(30);

      if (error) throw error;
      posts = data || [];
      renderFeedList();
    } catch (err) {
      console.warn('Posts load error:', err);
      const feedEl = document.getElementById('feed-list');
      if (feedEl) feedEl.innerHTML = '<p class="feed-empty">Could not load posts.</p>';
    }
  }

  function subscribeToFeed(username) {
    // Clean up any existing subscription
    if (realtimeSub) {
      try { sbClient.removeChannel(realtimeSub); } catch (_) {}
      realtimeSub = null;
    }

    realtimeSub = sbClient
      .channel(`public-feed-${username}`)
      .on(
        'postgres_changes',
        {
          event: '*',
          schema: 'public',
          table: 'center_stage_posts',
          filter: `username=ilike.${username}`,
        },
        (payload) => {
          try {
            if (payload.eventType === 'INSERT') {
              // Only show public posts
              if (payload.new?.feed_type === 'public') {
                posts = [payload.new, ...posts].slice(0, 30);
                renderFeedList();
              }
            } else if (payload.eventType === 'UPDATE') {
              posts = posts.map(p =>
                p.id === payload.new.id ? { ...p, ...payload.new } : p
              );
              renderFeedList();
            } else if (payload.eventType === 'DELETE') {
              posts = posts.filter(p => p.id !== payload.old?.id);
              renderFeedList();
            }
          } catch (err) {
            console.warn('Realtime handler error:', err);
          }
        }
      )
      .subscribe(status => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.warn('Realtime subscription issue:', status, '— will retry in 5s');
          setTimeout(() => subscribeToFeed(username), 5000);
        }
      });
  }

  // ── Pull-to-refresh ────────────────────────────────────────────────────────
  function setupPullToRefresh(username) {
    let startY      = 0;
    let pulling     = false;
    let triggered   = false;
    const THRESHOLD = 72;

    document.addEventListener('touchstart', e => {
      if (window.scrollY === 0 && e.touches.length === 1) {
        startY  = e.touches[0].clientY;
        pulling = true;
        triggered = false;
      }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!pulling) return;
      const delta = e.touches[0].clientY - startY;
      if (delta > THRESHOLD && !triggered) {
        triggered = true;
        ptrEl.classList.add('visible');
      }
    }, { passive: true });

    document.addEventListener('touchend', async () => {
      if (!pulling) return;
      pulling = false;
      if (triggered) {
        try {
          await loadPosts(username);
          // Re-subscribe to ensure fresh channel
          subscribeToFeed(username);
        } catch (err) {
          console.warn('Refresh error:', err);
        } finally {
          ptrEl.classList.remove('visible');
          triggered = false;
        }
      }
    }, { passive: true });
  }

  // ── Main ───────────────────────────────────────────────────────────────────
  async function main() {
    // Guard: Supabase JS must be loaded
    if (typeof supabase === 'undefined') {
      cardEl.innerHTML = '<p class="state-message">Could not load. Please refresh.</p>';
      return;
    }

    sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params   = new URLSearchParams(window.location.search);
    const username = params.get('u')?.trim();

    if (!username) { renderNoUsername(); return; }

    currentUser = { username };

    try {
      // 1. Fetch profile
      const { data: profile, error: profileErr } = await sbClient
        .from('profiles')
        .select('username, display_name, photo_url, payment_links')
        .ilike('username', username)
        .maybeSingle();

      if (profileErr || !profile) { renderNotFound(); return; }

      // 2. Fetch stats
      const { data: stats } = await sbClient
        .from('leaderboard_totals')
        .select('tip_count, referral_count')
        .ilike('username', username)
        .maybeSingle();

      // 3. Render shell (includes #feed-list placeholder)
      renderProfile(profile, stats);

      // 4. Load posts + subscribe
      await loadPosts(profile.username);
      subscribeToFeed(profile.username);

      // 5. Pull-to-refresh
      setupPullToRefresh(profile.username);

      // 6. Tap counter (non-critical)
      try {
        await sbClient.rpc('increment_profile_taps', { profile_username: profile.username });
      } catch (tapErr) {
        console.warn('Tap counter failed (non-critical):', tapErr);
      }

    } catch (e) {
      console.error('NipTip profile error:', e);
      renderError();
    }
  }

  main();
})();
</script>
</body>
</html>
