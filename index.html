<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NipTip</title>
<style>
  :root {
    --brand: #FF2D78;
    --bg: #fafafa;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #eeeeee;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    text-align: center;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    background: #e0e0e0;
    margin: 0 auto 16px;
    display: block;
  }

  .avatar-placeholder {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: #e0e0e0;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: #9e9e9e;
  }

  .username {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 4px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 28px;
  }

  .link-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    background: #f5f5f5;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.1s ease, background 0.15s ease;
  }

  .link-item:active {
    transform: scale(0.98);
    background: #ececec;
  }

  .link-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--brand);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .link-text {
    text-align: left;
    overflow: hidden;
  }

  .link-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .link-value {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .state-message {
    color: var(--text-muted);
    font-size: 15px;
    padding: 40px 0;
  }

  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: #bbb;
  }

  .footer a {
    color: #bbb;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #eee;
    border-top-color: var(--brand);
    border-radius: 50%;
    margin: 0 auto;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="state-message">
    <div class="spinner"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://jtqlkpiggmzvpcyjjhwd.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_klTPF2ZiLYzHqOsehCIQlA__wMG_176';

  const cardEl = document.getElementById('card');

  let supabaseClient;
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) {
    cardEl.innerHTML = `
      <p class="state-message">Could not connect. Please refresh the page.</p>
    `;
  }

  const LINK_ICONS = {
    cashApp: '$',
    venmo: 'V',
    paypal: 'P',
    linktree: '🔗',
    website: '🌐',
    custom: '↗',
  };

  const LINK_LABELS = {
    cashApp: 'Cash App',
    venmo: 'Venmo',
    paypal: 'PayPal',
    linktree: 'Linktree',
    website: 'Website',
  };

  function buildLinkHref(type, value) {
    switch (type) {
      case 'cashApp': {
        const tag = value.startsWith('$') ? value.slice(1) : value;
        return `https://cash.app/$${tag}`;
      }
      case 'venmo': {
        const handle = value.startsWith('@') ? value.slice(1) : value;
        return `https://venmo.com/${handle}`;
      }
      case 'paypal':
        return value.startsWith('http') ? value : `https://${value}`;
      case 'linktree':
        return value.startsWith('http') ? value : `https://${value}`;
      case 'website':
        return value.startsWith('http') ? value : `https://${value}`;
      default:
        return value.startsWith('http') ? value : `https://${value}`;
    }
  }

  function linkItemHtml(entry) {
    if (!entry || !entry.value) return '';
    const type = entry.type || 'custom';
    const icon = LINK_ICONS[type] || LINK_ICONS.custom;
    const label = entry.label || LINK_LABELS[type] || 'Link';
    const href = buildLinkHref(type, entry.value);

    return `
      <a class="link-item" href="${href}" target="_blank" rel="noopener noreferrer">
        <div class="link-icon">${icon}</div>
        <div class="link-text">
          <div class="link-label">${label}</div>
          <div class="link-value">${entry.value}</div>
        </div>
      </a>
    `;
  }

  function renderProfile(profile) {
    const avatarHtml = profile.photo_url
      ? `<img class="avatar" src="${profile.photo_url}" alt="${profile.username}" />`
      : `<div class="avatar-placeholder">👤</div>`;

    const displayName = profile.display_name || profile.username;

    let linksHtml = '';
    if (Array.isArray(profile.payment_links)) {
      linksHtml = profile.payment_links.map(linkItemHtml).join('');
    }

    cardEl.innerHTML = `
      ${avatarHtml}
      <h1 class="username">@${profile.username}</h1>
      <p class="subtitle">Support ${displayName} below</p>
      <div class="link-list">
        ${linksHtml || '<p class="state-message">No links added yet.</p>'}
      </div>
      <div class="footer">Powered by NipTip</div>
    `;
  }

  function renderNotFound() {
    cardEl.innerHTML = `
      <p class="state-message">Profile not found.</p>
    `;
  }

  function renderNoUsername() {
    cardEl.innerHTML = `
      <p class="state-message">No profile specified.</p>
    `;
  }

  async function loadProfile() {
    if (!supabaseClient) return;

    const params = new URLSearchParams(window.location.search);
    const username = params.get('u')?.trim();

    if (!username) {
      renderNoUsername();
      return;
    }

    try {
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('username, display_name, photo_url, payment_links')
        .ilike('username', username)
        .single();

      if (error || !data) {
        renderNotFound();
        return;
      }

      renderProfile(data);
    } catch (e) {
      cardEl.innerHTML = `
        <p class="state-message">Something went wrong loading this profile. Please refresh.</p>
      `;
    }
  }

  loadProfile();
</script>

</body>
</html>
