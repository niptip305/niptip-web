<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NipTip</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0A0A0F;
    color: #F5F5FA;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #15151D;
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
  }
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    background: linear-gradient(135deg, #FF1493, #0FF0DC);
    margin: 0 auto;
  }
  .username { font-size: 22px; font-weight: 800; margin: 14px 0 4px; }
  .bio { font-size: 14px; color: #9A9AAE; margin: 0 0 20px; }
  .section-label {
    font-size: 11px;
    letter-spacing: 1px;
    color: #9A9AAE;
    text-align: left;
    margin: 20px 0 8px;
  }
  .link-item {
    display: flex;
    align-items: center;
    background: #1D1D27;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    text-align: left;
  }
  .link-item .label { font-size: 11px; color: #9A9AAE; display: block; }
  .link-item .value { font-size: 14px; font-weight: 600; word-break: break-word; }
  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-start;
  }
  .badge-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }
  .badge-chip.unlocked { background: linear-gradient(135deg, #FF1493, #0FF0DC); color: #0A0A0F; }
  .badge-chip.locked { background: #1D1D27; color: #555; }
  .referral-count { font-size: 28px; font-weight: 800; color: #0FF0DC; margin: 4px 0; }
  .referral-label { font-size: 11px; color: #9A9AAE; letter-spacing: 1px; }
  .state-message { color: #9A9AAE; font-size: 14px; padding: 40px 0; }
  .footer { margin-top: 28px; font-size: 12px; color: #555; }
</style>
</head>
<body>
  <div class="card" id="card">
    <p class="state-message">Loading...</p>
  </div>

<script>
  const SUPABASE_URL = 'https://jtqlkpiggmzvpcyjjhwd.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_klTPF2ZiLYzHqOsehCIQlA__wMG_176';
  const cardEl = document.getElementById('card');

  const TIP_MILESTONES = [
    { threshold: 10, emoji: '🙂', label: 'Rising Star' },
    { threshold: 25, emoji: '💫', label: 'Fan Favorite' },
    { threshold: 50, emoji: '🎉', label: 'Crowd Pleaser' },
    { threshold: 100, emoji: '🔥', label: 'Century Tipper' },
    { threshold: 250, emoji: '🌟', label: 'Superstar' },
    { threshold: 500, emoji: '✨', label: 'Tip Legend' },
  ];

  const REFERRAL_TIERS = [
    { threshold: 5, emoji: '🥇', label: 'Badge One' },
    { threshold: 15, emoji: '🥈', label: 'Badge Two' },
    { threshold: 30, emoji: '🥉', label: 'Badge Three' },
    { threshold: 50, emoji: '👑', label: 'Ambassador' },
  ];

  function badgeRow(tiers, count) {
    return tiers.map(t => {
      const unlocked = count >= t.threshold;
      return `<div class="badge-chip ${unlocked ? 'unlocked' : 'locked'}"><span>${t.emoji}</span>${t.label}</div>`;
    }).join('');
  }

  function linkTypeLabel(type) {
    const map = { cashApp: 'Cash App', venmo: 'Venmo', paypal: 'PayPal' };
    return map[type] || type || 'Link';
  }

  function linksHtml(links) {
    if (!Array.isArray(links) || links.length === 0) {
      return '<p class="state-message">No payment links yet.</p>';
    }
    return links.map(l => `
      <div class="link-item">
        <div>
          <span class="label">${l.label || linkTypeLabel(l.type)}</span>
          <span class="value">${l.value || ''}</span>
        </div>
      </div>
    `).join('');
  }

  function renderProfile(profile, stats) {
    const tipCount = stats?.tip_count || 0;
    const referralCount = stats?.referral_count || 0;

    cardEl.innerHTML = `
      ${profile.photo_url ? `<img class="avatar" src="${profile.photo_url}" alt="${profile.username}" />` : `<div class="avatar"></div>`}
      <h1 class="username">@${profile.username}</h1>
      <p class="bio">${profile.display_name || ''}</p>

      <div class="section-label">PAYMENT LINKS</div>
      ${linksHtml(profile.payment_links)}

      <div class="section-label">TIP MILESTONES</div>
      <div class="badge-row">${badgeRow(TIP_MILESTONES, tipCount)}</div>

      <div class="section-label">REFERRAL TIERS</div>
      <div class="badge-row">${badgeRow(REFERRAL_TIERS, referralCount)}</div>

      <div class="referral-count">${referralCount}</div>
      <div class="referral-label">REFERRALS</div>

      <div class="footer">Powered by NipTip</div>
    `;
  }

  function renderNotFound() {
    cardEl.innerHTML = '<p class="state-message">Profile not found.</p>';
  }

  function renderNoUsername() {
    cardEl.innerHTML = '<p class="state-message">No username provided.</p>';
  }

  async function main() {
    if (typeof supabase === 'undefined') {
      cardEl.innerHTML = '<p class="state-message">Could not load. Please refresh.</p>';
      return;
    }

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const params = new URLSearchParams(window.location.search);
    const username = params.get('u')?.trim();

    if (!username) {
      renderNoUsername();
      return;
    }

    try {
      const { data: profile, error } = await supabaseClient
        .from('profiles')
        .select('username, display_name, photo_url, payment_links')
        .ilike('username', username)
        .maybeSingle();

      if (error || !profile) {
        renderNotFound();
        return;
      }

      const { data: stats } = await supabaseClient
        .from('leaderboard_totals')
        .select('tip_count, referral_count')
        .ilike('username', username)
        .maybeSingle();

      renderProfile(profile, stats);

      supabaseClient.rpc('increment_profile_taps', { profile_username: profile.username }).catch(() => {});
    } catch (e) {
      cardEl.innerHTML = '<p class="state-message">Something went wrong. Please refresh.</p>';
    }
  }

  main();
</script>
</body>
</html>
