<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NipTip</title>
<style>
  :root {
    --brand: #FF2D78;
    --bg: #fafafa;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #eeeeee;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border-radius: 24px;
    padding: 32px 24px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    text-align: center;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    background: #e0e0e0;
    margin: 0 auto 16px;
    display: block;
  }

  .avatar-placeholder {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: #e0e0e0;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: #9e9e9e;
  }

  .username {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 4px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 28px;
  }

  .link-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    background: #f5f5f5;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.1s ease, background 0.15s ease;
  }

  .link-item:active {
    transform: scale(0.98);
    background: #ececec;
  }

  .link-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--brand);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .link-text {
    text-align: left;
    overflow: hidden;
  }

  .link-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .link-value {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .state-message {
    color: var(--text-muted);
    font-size: 15px;
    padding: 40px 0;
  }

  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: #bbb;
  }

  .footer a {
    color: #bbb;
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
  }

  .badge-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    background: linear-gradient(135deg, #FF1493, #0FF0DC);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
  }

  .badge-chip .emoji {
    font-size: 14px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #eee;
    border-top-color: var(--brand);
    border-radius: 50%;
    margin: 0 auto;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="state-message">
    <div class="spinner"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://jtqlkpiggmzvpcyjjhwd.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_klTPF2ZiLYzHqOsehCIQlA__wMG_176';

  const cardEl = document.getElementById('card');

  let supabaseClient;
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) {
    cardEl.innerHTML = `
      <p class="state-message">Could not connect. Please refresh the page.</p>
    `;
  }

  const LINK_ICONS = {
    cashApp: '$',
    venmo: 'V',
    paypal: 'P',
    linktree: '🔗',
    website: '🌐',
    custom: '↗',
  };

  const LINK_LABELS = {
    cashApp: 'Cash App',
    venmo: 'Venmo',
    paypal: 'PayPal',
    linktree: 'Linktree',
    website: 'Website',
  };

  function buildLinkHref(type, value) {
    switch (type) {
      case 'cashApp': {
        const tag = value.startsWith('$') ? value.slice(1) : value;
        return `https://cash.app/$${tag}`;
      }
      case 'venmo': {
        const handle = value.startsWith('@') ? value.slice(1) : value;
        return `https://venmo.com/${handle}`;
      }
      case 'paypal':
        return value.startsWith('http') ? value : `https://${value}`;
      case 'linktree':
        return value.startsWith('http') ? value : `https://${value}`;
      case 'website':
        return value.startsWith('http') ? value : `https://${value}`;
      default:
        return value.startsWith('http') ? value : `https://${value}`;
    }
  }

  // Renders one entry from the `payment_links` jsonb array. Each entry is
  // expected to look like: { "type": "cashApp", "label": "Cash App", "value": "$joey" }
  // "type" picks the icon/href-building rules above; "label" is optional
  // display text (falls back to LINK_LABELS[type], then "Link").
  function linkItemHtml(entry) {
    if (!entry || !entry.value) return '';
    const type = entry.type || 'custom';
    const icon = LINK_ICONS[type] || LINK_ICONS.custom;
    const label = entry.label || LINK_LABELS[type] || 'Link';
    const href = buildLinkHref(type, entry.value);

    return `
      <a class="link-item" href="${href}" target="_blank" rel="noopener noreferrer">
        <div class="link-icon">${icon}</div>
        <div class="link-text">
          <div class="link-label">${label}</div>
          <div class="link-value">${entry.value}</div>
        </div>
      </a>
    `;
  }

  // Same thresholds as the Flutter app's Creator Hub — keep these in
  // sync if you ever change one side.
  const TIP_MILESTONES = [
    { threshold: 500, emoji: '✨', label: 'Tip Legend' },
    { threshold: 250, emoji: '🌟', label: 'Superstar' },
    { threshold: 100, emoji: '🔥', label: 'Century Tipper' },
    { threshold: 50, emoji: '🎉', label: 'Crowd Pleaser' },
    { threshold: 25, emoji: '💫', label: 'Fan Favorite' },
    { threshold: 10, emoji: '🙂', label: 'Rising Star' },
  ];

  const REFERRAL_MILESTONES = [
    { threshold: 50, emoji: '👑', label: 'Ambassador' },
    { threshold: 30, emoji: '🥉', label: 'Badge Three' },
    { threshold: 15, emoji: '🥈', label: 'Badge Two' },
    { threshold: 5, emoji: '🥇', label: 'Badge One' },
  ];

  function highestMilestone(list, count) {
    return list.find((m) => count >= m.threshold) || null;
  }

  function badgesHtml(tipCount, referralCount) {
    const badges = [];

    const tipBadge = highestMilestone(TIP_MILESTONES, tipCount || 0);
    if (tipBadge) {
      badges.push(`<div class="badge-chip"><span class="emoji">${tipBadge.emoji}</span>${tipBadge.label}</div>`);
    }

    const referralBadge = highestMilestone(REFERRAL_MILESTONES, referralCount || 0);
    if (referralBadge) {
      badges.push(`<div class="badge-chip"><span class="emoji">${referralBadge.emoji}</span>${referralBadge.label}</div>`);
    }

    if (badges.length === 0) return '';
    return `<div class="badge-row">${badges.join('')}</div>`;
  }

  function renderProfile(profile, stats) {
    const avatarHtml = profile.photo_url
      ? `<img class="avatar" src="${profile.photo_url}" alt="${profile.username}" />`
      : `<div class="avatar-placeholder">👤</div>`;

    const displayName = profile.display_name || profile.username;

    let linksHtml = '';
    if (Array.isArray(profile.payment_links)) {
      linksHtml = profile.payment_links.map(linkItemHtml).join('');
    }

    const badges = stats ? badgesHtml(stats.tip_count, stats.referral_count) : '';

    cardEl.innerHTML = `
      ${avatarHtml}
      <h1 class="username">@${profile.username}</h1>
      <p class="subtitle">Support ${displayName} below</p>
      ${badges}
      <div class="link-list">
        ${linksHtml || '<p class="state-message">No links added yet.</p>'}
      </div>
      <div class="footer">Powered by NipTip</div>
    `;
  }

  function renderNotFound() {
    cardEl.innerHTML = `
      <p class="state-message">Profile not found.</p>
    `;
  }

  function renderNoUsername() {
    cardEl.innerHTML = `
      <p class="state-message">No profile specified.</p>
    `;
  }

  async function loadProfile() {
    if (!supabaseClient) return; // CDN failed to load; message already shown above.

    const params = new URLSearchParams(window.location.search);
    const username = params.get('u')?.trim();

    if (!username) {
      renderNoUsername();
      return;
    }

    try {
      const { data, error } = await supabaseClient
        .from('profiles')
        .select('username, display_name, photo_url, payment_links')
        .ilike('username', username)
        .single();

      if (error || !data) {
        renderNotFound();
        return;
      }

      renderProfile(data, null);

      // Badge stats come from leaderboard_totals — the public-safe
      // aggregate table — not from profiles, since tip counts and
      // referral counts live there. Fetched separately and re-rendered
      // so a failure here never blocks showing the core profile.
      try {
        const { data: stats } = await supabaseClient
          .from('leaderboard_totals')
          .select('tip_count, referral_count')
          .ilike('username', username)
          .single();

        if (stats) renderProfile(data, stats);
      } catch (_) {
        // No stats row yet (e.g. brand new user) — profile still shows fine.
      }

      // Fire-and-forget: increment this profile's tap counter. Failure
      // here shouldn't block showing the profile to the visitor.
      supabaseClient.rpc('increment_profile_taps', {
        profile_username: data.username,
      }).catch(() => {});
    } catch (e) {
      cardEl.innerHTML = `
        <p class="state-message">Something went wrong loading this profile. Please refresh.</p>
      `;
    }
  }

  loadProfile();
</script>

</body>
</html>
